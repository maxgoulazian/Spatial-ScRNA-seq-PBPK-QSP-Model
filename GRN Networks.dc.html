<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{margin:0;font-family:'IBM Plex Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
    a{color:#0E7C5F;text-decoration:none}
  </style>
  <script src="grn_data.js"></script>
</helmet>
<div style="width:1120px;height:680px;position:relative;background:radial-gradient(130% 120% at 20% 8%, #FCFAF5 0%, #F3ECE0 60%, #E9E0D0 100%);color:#1A1712;font-family:'IBM Plex Sans',sans-serif;display:flex;overflow:hidden">

  <div style="flex:1;position:relative;min-width:0;display:flex;flex-direction:column;padding:24px 12px 18px 26px">
    <div style="pointer-events:none">
      <div style="font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:#B87A22;font-weight:600">Signed gene-regulatory network</div>
      <div style="font-family:'Newsreader',serif;font-size:27px;font-weight:600;margin-top:4px;line-height:1.05">{{ title }}</div>
    </div>
    <div style="flex:1;min-height:0;position:relative">{{ netEl }}</div>
    <div style="display:flex;gap:20px;align-items:center;pointer-events:none;padding-left:6px">
      <div style="display:flex;align-items:center;gap:7px"><span style="width:16px;height:3px;background:#1F8A5B;display:inline-block"></span><span style="font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:#4A4438">activating edge</span></div>
      <div style="display:flex;align-items:center;gap:7px"><span style="width:16px;height:3px;background:#C0392B;display:inline-block"></span><span style="font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:#4A4438">repressing edge</span></div>
      <div style="display:flex;align-items:center;gap:7px"><span style="width:13px;height:13px;border-radius:50%;background:#1F8A5B;display:inline-block"></span><span style="font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:#4A4438">node = effector drive</span></div>
      <div style="font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:#8C8474">size = out-degree</div>
    </div>
  </div>

  <div style="width:340px;flex:none;background:#FBF8F1;border-left:1px solid #E2D9C9;padding:24px 24px 20px;display:flex;flex-direction:column;overflow-y:auto">
    <div style="font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#8C8474">Lineage network</div>
    <div style="display:flex;gap:8px;margin-top:10px">
      <sc-for list="{{ tabs }}" as="t" hint-placeholder-count="2">
        <button onClick="{{ t.onClick }}" style="{{ t.style }}">{{ t.label }}</button>
      </sc-for>
    </div>

    <div style="margin-top:20px;background:#FFFFFF;border:1px solid #E7DECF;border-radius:10px;padding:15px 17px">
      <div style="font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.12em;color:#8C8474;text-transform:uppercase">{{ selKicker }}</div>
      <div style="font-family:'Newsreader',serif;font-size:26px;font-weight:600;margin-top:6px;color:{{ selColor }}">{{ selName }}</div>
      <div style="display:flex;gap:20px;margin-top:12px">
        <div><div style="font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:600;color:#1A1712">{{ selDrive }}</div><div style="font-family:'IBM Plex Mono',monospace;font-size:9.5px;color:#8C8474;margin-top:2px">EFFECTOR DRIVE</div></div>
        <div><div style="font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:600;color:#1A1712">{{ selOut }}</div><div style="font-family:'IBM Plex Mono',monospace;font-size:9.5px;color:#8C8474;margin-top:2px">OUT-EDGES</div></div>
      </div>
      <div style="font-size:13px;line-height:1.5;color:#4A4438;margin-top:12px">{{ selNote }}</div>
    </div>

    <div style="font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#8C8474;margin-top:20px">Effector drive · ranked</div>
    <div style="display:flex;flex-direction:column;gap:5px;margin-top:11px">
      <sc-for list="{{ ranks }}" as="r" hint-placeholder-count="6">
        <button onClick="{{ r.onClick }}" style="{{ r.style }}">
          <span style="width:52px;text-align:left;font-weight:600">{{ r.name }}</span>
          <span style="flex:1;height:9px;background:#EFE7D8;border-radius:5px;position:relative;overflow:hidden"><span style="position:absolute;left:0;top:0;bottom:0;width:{{ r.pct }};background:{{ r.bar }};border-radius:5px"></span></span>
          <span style="width:42px;text-align:right;font-family:'IBM Plex Mono',monospace;font-size:11px;color:#6E6656">{{ r.val }}</span>
        </button>
      </sc-for>
    </div>

    <div style="margin-top:auto;padding-top:16px;font-family:'IBM Plex Mono',monospace;font-size:9.5px;color:#8C8474;line-height:1.6">{{ source }}</div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1120,&quot;height&quot;:680}}">
class Component extends DCLogic {
  constructor(props){
    super(props);
    this.state = { key:'cd8', hover:null, sel:null };
    this.TABS = { cd8:'CD8 effector', cd4:'CD4 lineage' };
    this.NOTE = {
      cd8:{ '4-1BB':'The dominant effector hub in CD8 — the strongest driver of the cytotoxic program, and the mechanistic basis for its clean nomination.',
            _def:'CD8 effector-lineage GRN. 4-1BB radiates the most signed edges into the cytotoxic program; the other arms are peripheral.' },
      cd4:{ '4-1BB':'In the CD4 lineage 4-1BB collapses to near-zero drive — the selectivity that keeps it off the toxicity axis.',
            _def:'CD4 lineage GRN. No single costim arm dominates; 4-1BB\u2019s hub role has disappeared relative to CD8.' }
    };
  }
  d(){ return (window.GRN && window.GRN.data[this.state.key]) || null; }
  maxDrive(){ const d=this.d(); if(!d) return 1; return Math.max(1, ...window.GRN.order.map(n=>d.nodes[n].drive)); }
  maxImp(){ const d=this.d(); if(!d) return 1; return Math.max(...d.edges.map(e=>e.imp), 0.001); }
  ramp(t){ const a=[247,238,224], b=[31,138,91]; const c=a.map((v,i)=>Math.round(v+(b[i]-v)*Math.min(1,Math.max(0,t)))); return 'rgb('+c[0]+','+c[1]+','+c[2]+')'; }
  scene(){
    const d=this.d(); if(!d) return null;
    const h=React.createElement, order=window.GRN.order, N=order.length;
    const W=760,H=470,cx=372,cy=232,R=192, active=this.state.hover||this.state.sel;
    const pos={}; order.forEach((n,i)=>{ const a=-Math.PI/2 + i*2*Math.PI/N; pos[n]={x:cx+R*Math.cos(a), y:cy+R*Math.sin(a), a}; });
    const mI=this.maxImp(), mD=this.maxDrive();
    const els=[]; let k=0;
    d.edges.forEach(e=>{ const p=pos[e.s], q=pos[e.t]; if(!p||!q) return;
      const rel = !active || e.s===active || e.t===active;
      const mx=(p.x+q.x)/2, my=(p.y+q.y)/2, dx=q.x-p.x, dy=q.y-p.y; const nx=-dy, ny=dx; const L=Math.hypot(nx,ny)||1; const bend=28; const cxp=mx+nx/L*bend, cyp=my+ny/L*bend;
      els.push(h('path',{key:'e'+(k++), d:'M'+p.x+' '+p.y+' Q'+cxp+' '+cyp+' '+q.x+' '+q.y, fill:'none', stroke: e.sign>0?'#1F8A5B':'#C0392B', strokeWidth: (0.5+2.6*(e.imp/mI))*(rel?1:0.5), opacity: rel?(0.22+0.5*(e.imp/mI)):0.05, strokeLinecap:'round'})); });
    order.forEach(n=>{ const p=pos[n], nd=d.nodes[n]; const rel = !active || n===active || d.edges.some(e=>(e.s===active&&e.t===n)||(e.t===active&&e.s===n));
      const rad = 12 + 1.35*Math.sqrt(nd.outdeg)*3.0; const isA = n===active;
      els.push(h('circle',{key:'nh'+n, cx:p.x, cy:p.y, r:Math.min(30,rad)+ (isA?5:0), fill:this.ramp(nd.drive/mD), stroke:isA?'#111':'#C9BFAE', strokeWidth:isA?2.2:1, opacity:rel?1:0.28, style:{cursor:'pointer'},
        onMouseEnter:()=>this.setState({hover:n}), onMouseLeave:()=>this.setState({hover:null}), onClick:()=>this.setState({sel:this.state.sel===n?null:n})}));
      const lx=cx+(R+30)*Math.cos(p.a), ly=cy+(R+30)*Math.sin(p.a); const anc=Math.abs(Math.cos(p.a))<0.35?'middle':(Math.cos(p.a)>0?'start':'end');
      els.push(h('text',{key:'nl'+n, x:lx, y:ly+3.5, textAnchor:anc, fontFamily:"'IBM Plex Mono',monospace", fontSize:12, fontWeight: n==='4-1BB'?700:500, fill: rel?(n==='4-1BB'?'#0B5E48':'#3A342B'):'#B8AE9C', style:{pointerEvents:'none'}}, n)); });
    return h('svg',{viewBox:'0 0 '+W+' '+H, width:'100%', height:'100%', preserveAspectRatio:'xMidYMid meet', style:{display:'block'}}, els);
  }
  renderVals(){
    const S=this.state, d=this.d(), order=(window.GRN&&window.GRN.order)||[];
    const tabBtn=(a)=>'flex:1;appearance:none;cursor:pointer;font-family:\'IBM Plex Mono\',monospace;font-size:12.5px;font-weight:600;padding:10px 0;border-radius:8px;border:1px solid '+(a?'#0E7C5F':'#D8CEBE')+';background:'+(a?'#E7F2ED':'#FFFFFF')+';color:'+(a?'#0B5E48':'#6E6656');
    const focus=S.sel||S.hover, mD=this.maxDrive();
    let sel={kicker:'network summary', name:this.TABS[S.key], drive:'—', out:'—', color:'#1A1712', note:(this.NOTE[S.key]._def)};
    if(focus && d){ const nd=d.nodes[focus]; sel={kicker:'receptor', name:focus, drive:(nd.drive).toFixed(2), out:String(nd.outdeg), color:focus==='4-1BB'?'#0B5E48':'#1A1712', note:(this.NOTE[S.key][focus]||('Signed edges from '+focus+' into the effector program.'))}; }
    const ranked = d? order.slice().sort((a,b)=>d.nodes[b].drive-d.nodes[a].drive):[];
    return {
      title: S.key==='cd8'?'CD8 effector lineage — 4-1BB is the hub':'CD4 lineage — the hub collapses',
      netEl: this.scene(),
      tabs:['cd8','cd4'].map(k=>({label:this.TABS[k], onClick:()=>this.setState({key:k, sel:null, hover:null}), style:tabBtn(S.key===k)})),
      selKicker:sel.kicker, selName:sel.name, selDrive:sel.drive, selOut:sel.out, selColor:sel.color, selNote:sel.note,
      ranks: ranked.map(n=>({ name:n, val:(d.nodes[n].drive).toFixed(2), pct:(6+94*(d.nodes[n].drive/mD)).toFixed(1)+'%', bar:n==='4-1BB'?'#0E7C5F':'#B7C9BE',
        onClick:()=>this.setState({sel:S.sel===n?null:n}),
        style:'appearance:none;cursor:pointer;display:flex;align-items:center;gap:9px;padding:5px 8px;border-radius:7px;border:1px solid '+((focus===n)?'#C9BFAE':'transparent')+';background:'+((focus===n)?'#FFFFFF':'transparent')+';font-family:\'IBM Plex Sans\',sans-serif;font-size:12.5px;color:#3A342B' })),
      source:'Source GRNBoost2 signed edges (edges_cd8/cd4.csv) + effector drive (drive_cd8/cd4.csv). Costim-arm subnetwork; edge width = importance, sign = expression correlation.'
    };
  }
}
</script>
</body>
</html>
