<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{margin:0;font-family:'IBM Plex Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
    a{color:#0E7C5F;text-decoration:none}
    .molcanvas canvas{border-radius:0!important}
  </style>
  <script src="struct_data.js"></script>
</helmet>
<a href="Costim - Start Here.dc.html" style="position:fixed;left:14px;bottom:14px;z-index:9999;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;letter-spacing:.04em;color:#1A1712;background:rgba(252,250,245,0.95);border:1px solid #C9BFAE;border-radius:20px;padding:7px 14px;text-decoration:none;box-shadow:0 3px 12px rgba(26,23,18,0.18)">&larr; Start here</a>
<div style="width:1120px;height:660px;position:relative;background:radial-gradient(130% 120% at 78% 8%, #FCFAF5 0%, #F3ECE0 55%, #E9E0D0 100%);color:#1A1712;font-family:'IBM Plex Sans',sans-serif;display:flex;overflow:hidden">

  <div style="flex:1;position:relative;min-width:0">
    <div ref="{{ setEl }}" class="molcanvas" style="position:absolute;inset:0;cursor:grab"></div>

    <div style="position:absolute;left:26px;top:22px;pointer-events:none">
      <div style="font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:#B87A22;font-weight:600">De novo binder &middot; interface-confirmed</div>
      <div style="font-family:'Newsreader',serif;font-size:29px;font-weight:600;margin-top:5px;line-height:1.05;color:#1A1712">{{ title }}</div>
      <div style="font-family:'IBM Plex Mono',monospace;font-size:12px;color:#6E6656;margin-top:4px">{{ subtitle }}</div>
    </div>

    <sc-if value="{{ loading }}" hint-placeholder-val="{{ true }}">
      <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none">
        <div style="font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.14em;color:#8C8474">{{ loadingMsg }}</div>
      </div>
    </sc-if>

    <div style="position:absolute;left:26px;bottom:22px;display:flex;gap:20px;align-items:flex-end;pointer-events:none">
      <sc-for list="{{ legend }}" as="g" hint-placeholder-count="4">
        <div style="display:flex;align-items:center;gap:7px"><span style="width:13px;height:4px;border-radius:2px;background:{{ g.color }};display:inline-block"></span><span style="font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.04em;color:#4A4438">{{ g.label }}</span></div>
      </sc-for>
    </div>

    <div style="position:absolute;right:22px;top:24px;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.06em;color:#8C8474;pointer-events:none;text-align:right">drag &#183; scroll to zoom<br>click a residue to label</div>
  </div>

  <div style="width:342px;flex:none;background:#FBF8F1;border-left:1px solid #E2D9C9;padding:24px 24px 20px;display:flex;flex-direction:column;gap:0;overflow-y:auto">
    <div style="font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#8C8474">De novo binder</div>
    <div style="display:flex;gap:8px;margin-top:10px">
      <sc-for list="{{ targets }}" as="t" hint-placeholder-count="2">
        <button onClick="{{ t.onClick }}" style="{{ t.style }}">{{ t.label }}</button>
      </sc-for>
    </div>

    <div style="display:flex;gap:10px;margin-top:20px">
      <div style="flex:1;background:#FFFFFF;border:1px solid #E7DECF;border-radius:9px;padding:11px 13px"><div style="font-family:'IBM Plex Mono',monospace;font-size:20px;font-weight:600;color:#0E7C5F">{{ mIpsae }}</div><div style="font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:.06em;color:#8C8474;margin-top:3px">ipSAE</div></div>
      <div style="flex:1;background:#FFFFFF;border:1px solid #E7DECF;border-radius:9px;padding:11px 13px"><div style="font-family:'IBM Plex Mono',monospace;font-size:20px;font-weight:600;color:#0E7C5F">{{ mScrmsd }}</div><div style="font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:.06em;color:#8C8474;margin-top:3px">FOLD-scRMSD</div></div>
      <div style="flex:1;background:#FFFFFF;border:1px solid #E7DECF;border-radius:9px;padding:11px 13px"><div style="font-family:'IBM Plex Mono',monospace;font-size:20px;font-weight:600;color:#2E86C1">{{ mEpi }}</div><div style="font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:.06em;color:#8C8474;margin-top:3px">EPITOPE res</div></div>
    </div>

    <div style="font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#8C8474;margin-top:22px">Designed CDR loops</div>
    <div style="display:flex;flex-direction:column;gap:7px;margin-top:11px">
      <sc-for list="{{ cdrs }}" as="c" hint-placeholder-count="3">
        <button onClick="{{ c.onClick }}" style="{{ c.style }}">
          <span style="display:flex;align-items:center;gap:9px"><span style="width:11px;height:11px;border-radius:3px;background:{{ c.color }}"></span><span style="font-weight:600">{{ c.name }}</span></span>
          <span style="font-family:'IBM Plex Mono',monospace;font-size:11px;opacity:0.75">{{ c.seq }}</span>
        </button>
      </sc-for>
    </div>

    <div style="font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#8C8474;margin-top:22px">View</div>
    <div style="display:flex;flex-direction:column;gap:8px;margin-top:11px">
      <button onClick="{{ epiFn }}" style="{{ epiStyle }}"><span style="display:flex;align-items:center;gap:9px"><span style="width:11px;height:11px;border-radius:3px;background:#2E86C1"></span><span style="font-weight:600">Target epitope</span></span><span style="font-family:'IBM Plex Mono',monospace;font-size:10.5px;opacity:0.75">{{ epiState }}</span></button>
      <button onClick="{{ surfFn }}" style="{{ surfStyle }}"><span style="font-weight:600">Target surface</span><span style="font-family:'IBM Plex Mono',monospace;font-size:10.5px;opacity:0.75">{{ surfState }}</span></button>
      <div style="display:flex;gap:8px">
        <button onClick="{{ spinFn }}" style="{{ spinStyle }}">{{ spinLabel }}</button>
        <button onClick="{{ resetFn }}" style="flex:1;appearance:none;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.05em;padding:11px 0;border-radius:8px;border:1px solid #D8CEBE;background:#FFFFFF;color:#4A4438">&#8635; Reset</button>
      </div>
    </div>

    <div style="margin-top:auto;padding-top:18px">
      <div style="font-size:12.5px;line-height:1.5;color:#4A4438">{{ note }}</div>
      <div style="font-family:'IBM Plex Mono',monospace;font-size:9.5px;color:#8C8474;margin-top:10px;line-height:1.5">{{ source }}</div>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1120,&quot;height&quot;:660}}">
class Component extends DCLogic {
  constructor(props){
    super(props);
    this.state = { key:'41bb', cdr:{H1:true,H2:true,H3:true}, epitope:true, surface:false, spinning:true, loading:true };
    this.COL = { target:'#6E6656', binder:'#1F8A5B', H1:'#E8A33D', H2:'#E0870D', H3:'#C0392B', epi:'#2E86C1' };
    this.META = {
      '41bb':{ label:'4-1BB', title:'4-1BB \u00d7 de novo VHH', subtitle:'41bb_r0867 \u00b7 AlphaFold-3 complex', ipsae:'0.49', scrmsd:'0.86 \u00c5', cls:'LEAD',
        cdrSeq:{H1:'GGDFSTY',H2:'SADGTL',H3:'WSPNSPAA'},
        note:'The designed VHH caps the CRD1 agonist epitope \u2014 its 14-residue footprint matches the urelumab-class non-blocking site (8.9 \u00c5 from the 4-1BBL trimer, 0 clashes). The geometry is the agonism rationale.',
        source:'Source AF3 complex 41bb_r0867_41bb_62.cif \u00b7 epitope = target residues \u22644.5 \u00c5 from binder.' },
      'cd27':{ label:'CD27', title:'CD27 \u00d7 de novo VHH', subtitle:'cd27_r0011 \u00b7 AlphaFold-3 complex', ipsae:'0.55', scrmsd:'0.60 \u00c5', cls:'LEAD',
        cdrSeq:{H1:'GGNFSSL',H2:'TADGTG',H3:'GWGLNSQY'},
        note:'The second costim co-lead. A clean VHH interface capping the CD70-binding site on CD27 \u2014 highest interface confidence (ipSAE 0.55) and tightest refold (0.60 \u00c5) of the co-leads.',
        source:'Source AF3 complex cd27_r0011_cd27_24.cif \u00b7 epitope = target residues \u22644.5 \u00c5 from binder.' },
      'cd3':{ label:'CD3', title:'CD3 \u00d7 de novo VH/VL', subtitle:'cd3_r0478 \u00b7 AlphaFold-3 complex', ipsae:'0.49', scrmsd:'1.00 \u00c5', cls:'LEAD',
        cdrSeq:{H1:'GFDISST',H2:'NPATGF',H3:'DDTTSETLTLKT'},
        note:'The CD3\u03b5 redirector arm \u2014 a de novo VH/VL docking the T-cell-engager epitope on CD3 (ipSAE 0.49, refold 1.00 \u00c5). Its 19-residue footprint is the recruitment interface of the bispecific.',
        source:'Source AF3 complex cd3_r0478_cd3_65.cif \u00b7 epitope = target residues \u22644.5 \u00c5 from binder.' },
      'cea5':{ label:'CEACAM5', title:'CEACAM5 \u00d7 de novo VH/VL', subtitle:'cea5_r0420 \u00b7 AlphaFold-3 complex', ipsae:'0.65', scrmsd:'1.05 \u00c5', cls:'LEAD',
        cdrSeq:{H1:'GFNISNY',H2:'NPATGE',H3:'SLSGGSSSLFT'},
        note:'The tumor-anchor arm \u2014 the highest interface confidence of the whole campaign (ipSAE 0.65), docked on the CEACAM5 B3 Ig-domain. This is the conditional-delivery handle for the therapeutic.',
        source:'Source AF3 complex cea5_r0420_cea5_52.cif \u00b7 epitope = target residues \u22644.5 \u00c5 from binder.' }
    };
  }
  componentDidMount(){ this._poll=0; this.loadLib(); }
  loadLib(){
    if(window.$3Dmol){ this.tryInit(); return; }
    if(this._libStarted){ this._t=setTimeout(()=>{ if(window.$3Dmol) this.tryInit(); },90); return; }
    this._libStarted=true;
    const add=(src,next)=>{ const s=document.createElement('script'); s.src=src; s.onload=()=>this.tryInit(); s.onerror=next?next:null; document.head.appendChild(s); };
    add('https://3Dmol.org/build/3Dmol-min.js', ()=>add('https://cdnjs.cloudflare.com/ajax/libs/3Dmol/2.4.2/3Dmol-min.js'));
    this._t=setTimeout(()=>{ if(!this._inited) this.tryInit(); }, 400);
  }
  componentWillUnmount(){ if(this._t) clearTimeout(this._t); if(this.viewer){ try{this.viewer.spin(false);}catch(e){} } }
  meta(){ return (window.STRUCTS && window.STRUCTS[this.state.key] && window.STRUCTS[this.state.key].meta) || {}; }
  tryInit(){
    if(this._inited) return;
    const ok = this.el && window.$3Dmol && window.STRUCTS;
    if(!ok){ this._poll++; if(this._poll>150){ this.setState({loading:true}); } this._t=setTimeout(()=>this.tryInit(),80); return; }
    this._inited=true;
    this.viewer = window.$3Dmol.createViewer(this.el, {backgroundColor:'#F4EEE2', antialias:true, disableFog:true});
    try{ this.viewer.setViewStyle({style:'outline', color:'#2A2620', width:0.05}); }catch(e){}
    this.load(this.state.key, true);
  }
  load(key, initial){
    const v=this.viewer; if(!v) return;
    try{ v.removeAllSurfaces(); }catch(e){}
    try{ v.removeAllLabels(); }catch(e){}
    v.clear();
    const s = window.STRUCTS[key];
    v.addModel(s.cif, 'cif');
    this.applyStyles(key);
    this.setupInteract();
    v.zoomTo();
    v.render();
    v.zoom(1.18,600);
    if(this.state.spinning) v.spin('y', 0.6); else v.spin(false);
    this.setState({loading:false});
  }
  applyStyles(key){
    const v=this.viewer; if(!v) return;
    key = key || this.state.key;
    const m = window.STRUCTS[key].meta, C=this.COL, S=this.state;
    v.setStyle({}, {});
    v.setStyle({chain:m.targetChains}, {cartoon:{color:C.target, opacity:1, thickness:0.5, arrows:true}});
    v.setStyle({chain:m.binderChain}, {cartoon:{color:C.binder, thickness:0.5, arrows:true}});
    ['H1','H2','H3'].forEach(w=>{ if(S.cdr[w] && m.cdr[w]){ v.addStyle({chain:(m.cdrChain||m.binderChain), resi:m.cdr[w][0]+'-'+m.cdr[w][1]}, {cartoon:{color:C[w]}, stick:{color:C[w], radius:0.22}}); }});
    if(S.epitope && m.epitope){ const byCh={}; m.epitope.forEach(e=>{ (byCh[e.chain]=byCh[e.chain]||[]).push(e.seq); }); Object.keys(byCh).forEach(ch=>{ v.addStyle({chain:ch, resi:byCh[ch]}, {stick:{color:C.epi, radius:0.2}}); }); }
    try{ v.removeAllSurfaces(); }catch(e){}
    if(S.surface){ v.addSurface(window.$3Dmol.SurfaceType.VDW, {opacity:0.55, color:'#D8CFBE'}, {chain:m.targetChains}); }
    v.render();
  }
  setupInteract(){
    const v=this.viewer; if(!v) return; const three2={ALA:'Ala',ARG:'Arg',ASN:'Asn',ASP:'Asp',CYS:'Cys',GLN:'Gln',GLU:'Glu',GLY:'Gly',HIS:'His',ILE:'Ile',LEU:'Leu',LYS:'Lys',MET:'Met',PHE:'Phe',PRO:'Pro',SER:'Ser',THR:'Thr',TRP:'Trp',TYR:'Tyr',VAL:'Val'};
    v.setHoverable({}, true, (atom)=>{
      if(!atom) return; if(atom.__hl) return; atom.__hl=true;
      this.viewer.addLabel((three2[atom.resn]||atom.resn)+' '+atom.resi, {position:atom, backgroundColor:'#17150F', backgroundOpacity:0.9, fontColor:'#F3EFE6', fontSize:11, borderThickness:1, borderColor:'rgba(232,163,61,0.7)', inFront:true});
      this.viewer.render();
    }, (atom)=>{ if(atom){ atom.__hl=false; } });
    v.setClickable({}, true, (atom)=>{
      if(!atom) return;
      this.viewer.addLabel((three2[atom.resn]||atom.resn)+' '+atom.resi+' :'+atom.chain, {position:atom, backgroundColor:'#0B0A07', backgroundOpacity:0.92, fontColor:'#F3EFE6', fontSize:12.5, borderThickness:1.4, borderColor:'#E8A33D', inFront:true});
      this.viewer.render();
    });
  }
  toggleCdr(w){ const cdr=Object.assign({}, this.state.cdr); cdr[w]=!cdr[w]; this.setState({cdr}, ()=>this.applyStyles()); }
  toggleEpi(){ this.setState({epitope:!this.state.epitope}, ()=>this.applyStyles()); }
  toggleSurf(){ this.setState({surface:!this.state.surface}, ()=>this.applyStyles()); }
  toggleSpin(){ const sp=!this.state.spinning; this.setState({spinning:sp}); if(this.viewer){ if(sp) this.viewer.spin('y',0.6); else this.viewer.spin(false); } }
  reset(){ if(this.viewer){ try{this.viewer.removeAllLabels();}catch(e){} this.viewer.zoomTo(); this.viewer.zoom(1.18,600); this.viewer.render(); } }
  switchTarget(key){ if(key===this.state.key) return; this.setState({key, loading:true}, ()=>{ this.load(key); }); }

  renderVals(){
    const S=this.state, C=this.COL, dm=this.META[S.key], m=this.meta();
    const cdrSeq = dm.cdrSeq;
    const btn=(active,accent)=>'appearance:none;cursor:pointer;text-align:left;display:flex;justify-content:space-between;align-items:center;gap:8px;padding:10px 13px;border-radius:8px;font-family:\'IBM Plex Sans\',sans-serif;font-size:13px;color:'+(active?'#1A1712':'#8C8474')+';border:1px solid '+(active?(accent||'#C9BFAE'):'#E4DBCB')+';background:'+(active?'#FFFFFF':'transparent')+';transition:all .16s';
    const tgtBtn=(active)=>'flex:1;appearance:none;cursor:pointer;font-family:\'IBM Plex Mono\',monospace;font-size:13px;font-weight:600;letter-spacing:.04em;padding:11px 0;border-radius:8px;border:1px solid '+(active?'#0E7C5F':'#D8CEBE')+';background:'+(active?'#E7F2ED':'#FFFFFF')+';color:'+(active?'#0B5E48':'#6E6656')+';transition:all .16s';
    return {
      setEl:(el)=>{ this.el=el; if(el && !this._inited){ this.tryInit(); } },
      loading:S.loading, loadingMsg: (window.$3Dmol?'rendering structure\u2026':'loading 3Dmol\u2026'),
      title:dm.title, subtitle:dm.subtitle,
      legend:[ {color:C.binder,label:'binder'},{color:C.H3,label:'CDR loops'},{color:C.epi,label:'target epitope'},{color:C.target,label:'target receptor'} ],
      targets:['41bb','cd27','cd3','cea5'].map(k=>({label:this.META[k].label, onClick:()=>this.switchTarget(k), style:tgtBtn(S.key===k)})),
      mIpsae:dm.ipsae, mScrmsd:dm.scrmsd, mEpi:(m.epitope?String(m.epitope.length):'\u2014'),
      cdrs:['H1','H2','H3'].map(w=>({ name:'CDR-'+w, seq:cdrSeq[w], color:C[w], onClick:()=>this.toggleCdr(w), style:btn(S.cdr[w], C[w]) })),
      epiFn:()=>this.toggleEpi(), epiStyle:btn(S.epitope, C.epi), epiState:S.epitope?'shown':'hidden',
      surfFn:()=>this.toggleSurf(), surfStyle:btn(S.surface), surfState:S.surface?'on':'off',
      spinFn:()=>this.toggleSpin(), spinStyle:'flex:1;appearance:none;cursor:pointer;font-family:\'IBM Plex Mono\',monospace;font-size:11px;letter-spacing:.05em;padding:11px 0;border-radius:8px;border:1px solid '+(S.spinning?'#C99A3A':'#D8CEBE')+';background:'+(S.spinning?'#FBF3E2':'#FFFFFF')+';color:'+(S.spinning?'#9A6E17':'#4A4438'), spinLabel:S.spinning?'\u23f8 Spin':'\u25b6 Spin',
      resetFn:()=>this.reset(),
      note:dm.note, source:dm.source
    };
  }
}
</script>
</body>
</html>
